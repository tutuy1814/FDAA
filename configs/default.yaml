# AIGC Detection Configuration

# Model settings
model:
  name: "AIGCDetector"
  backbone: "ViT-L/14"
  num_classes: 2
  img_size: 224
  patch_size: 14
  embed_dim: 1024
  num_adapter_layers: 3
  num_prototypes: 4
  use_hierarchical: true
  dropout: 0.1
  freeze_backbone: true

# FDAA settings
fdaa:
  reduction: 4
  num_heads: 8
  use_srm: true
  use_dct: true
  use_wavelet: false  # Requires pytorch_wavelets

# MGFP settings
mgfp:
  num_prototypes: 4
  use_hierarchical: true

# Training settings
training:
  batch_size: 32
  num_epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.0001
  optimizer: "AdamW"
  scheduler: "CosineAnnealingLR"
  warmup_epochs: 5

# Loss settings
loss:
  use_focal: true
  focal_alpha: 0.25
  focal_gamma: 2.0
  use_contrastive: false
  contrastive_weight: 0.1
  use_aux: true
  aux_weight: 0.5
  use_localization: false
  localization_weight: 0.1

# Data settings
data:
  train_dataset: "FaceForensics++"
  test_datasets:
    - "FaceForensics++"
    - "Celeb-DF-v2"
    - "GenImage"
  num_workers: 8
  pin_memory: true

# Augmentation settings
augmentation:
  resize: 224
  random_crop: true
  horizontal_flip: true
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

# Evaluation settings
evaluation:
  metrics:
    - accuracy
    - auc
    - ap
    - eer
  save_predictions: true
  visualize_attention: true

# Logging settings
logging:
  log_interval: 100
  save_interval: 5
  tensorboard: true
  wandb: false

# Paths
paths:
  data_root: "./datasets"
  output_dir: "./outputs"
  checkpoint_dir: "./checkpoints"
  log_dir: "./logs"
